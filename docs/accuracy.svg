<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 280" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="sh4"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
  </defs>

  <rect width="820" height="280" rx="16" fill="#fafafa"/>

  <text x="410" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Attention Accuracy After Compression</text>
  <text x="410" y="56" text-anchor="middle" font-size="13" fill="#64748b">Cosine similarity between FP16 and TQ attention scores (Qwen2.5-3B, 72 layer-head pairs)</text>

  <!-- Bar chart area -->
  <g transform="translate(100, 80)">
    <!-- Y axis labels -->
    <text x="-10" y="8" text-anchor="end" font-size="11" fill="#64748b">100%</text>
    <text x="-10" y="58" text-anchor="end" font-size="11" fill="#64748b">99%</text>
    <text x="-10" y="108" text-anchor="end" font-size="11" fill="#64748b">98%</text>
    <text x="-10" y="158" text-anchor="end" font-size="11" fill="#64748b">97%</text>

    <!-- Grid lines -->
    <line x1="0" y1="5" x2="620" y2="5" stroke="#f1f5f9" stroke-width="1"/>
    <line x1="0" y1="55" x2="620" y2="55" stroke="#f1f5f9" stroke-width="1"/>
    <line x1="0" y1="105" x2="620" y2="105" stroke="#f1f5f9" stroke-width="1"/>
    <line x1="0" y1="155" x2="620" y2="155" stroke="#f1f5f9" stroke-width="1"/>

    <!-- Baseline (100%) at y=5, 99% at y=55, so 1% = 50px -->
    <!-- TQ-4bit: 0.9986 → bar height from 100% = 0.14% → 7px from top -->
    <!-- TQ-3bit: 0.9955 → bar from 100% = 0.45% → 22.5px from top -->
    <!-- TQ-2bit: 0.9878 → bar from 100% = 1.22% → 61px from top -->

    <!-- Group: 2K context -->
    <text x="105" y="180" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">2K Context</text>

    <!-- 4-bit bar -->
    <rect x="30" y="5.5" width="50" height="150" rx="4" fill="#a5b4fc" filter="url(#sh4)"/>
    <text x="55" y="-2" text-anchor="middle" font-size="10" font-weight="600" fill="#4338ca">4-bit</text>
    <text x="55" y="85" text-anchor="middle" font-size="11" font-weight="700" fill="white" transform="rotate(-90, 55, 85)">99.89%</text>

    <!-- 3-bit bar -->
    <rect x="85" y="24.5" width="50" height="131" rx="4" fill="#6366f1" filter="url(#sh4)"/>
    <text x="110" y="-2" text-anchor="middle" font-size="10" font-weight="600" fill="#4338ca">3-bit</text>
    <text x="110" y="85" text-anchor="middle" font-size="11" font-weight="700" fill="white" transform="rotate(-90, 110, 85)">99.61%</text>

    <!-- 2-bit bar -->
    <rect x="140" y="56.5" width="50" height="99" rx="4" fill="#c084fc" filter="url(#sh4)"/>
    <text x="165" y="-2" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">2-bit</text>
    <text x="165" y="85" text-anchor="middle" font-size="11" font-weight="700" fill="white" transform="rotate(-90, 165, 95)">98.97%</text>

    <!-- Group: 8K context -->
    <text x="355" y="180" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">8K Context</text>

    <rect x="280" y="8.5" width="50" height="147" rx="4" fill="#a5b4fc" filter="url(#sh4)"/>
    <text x="305" y="-2" text-anchor="middle" font-size="10" font-weight="600" fill="#4338ca">4-bit</text>
    <text x="305" y="85" text-anchor="middle" font-size="11" font-weight="700" fill="white" transform="rotate(-90, 305, 85)">99.83%</text>

    <rect x="335" y="30" width="50" height="125" rx="4" fill="#6366f1" filter="url(#sh4)"/>
    <text x="360" y="-2" text-anchor="middle" font-size="10" font-weight="600" fill="#4338ca">3-bit</text>
    <text x="360" y="85" text-anchor="middle" font-size="11" font-weight="700" fill="white" transform="rotate(-90, 360, 90)">99.45%</text>

    <rect x="390" y="69" width="50" height="86" rx="4" fill="#c084fc" filter="url(#sh4)"/>
    <text x="415" y="-2" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">2-bit</text>
    <text x="415" y="92" text-anchor="middle" font-size="11" font-weight="700" fill="white" transform="rotate(-90, 415, 100)">98.51%</text>

    <!-- Compression ratio labels at bottom -->
    <text x="105" y="198" text-anchor="middle" font-size="11" fill="#94a3b8">3.8x / 5x / 7.3x</text>
    <text x="355" y="198" text-anchor="middle" font-size="11" fill="#94a3b8">3.8x / 5x / 7.3x</text>

    <!-- Sweet spot marker -->
    <rect x="495" y="20" width="130" height="68" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
    <text x="560" y="42" text-anchor="middle" font-size="11" font-weight="700" fill="#047857">Sweet Spot</text>
    <text x="560" y="60" text-anchor="middle" font-size="24" font-weight="800" fill="#059669">3-bit</text>
    <text x="560" y="80" text-anchor="middle" font-size="11" fill="#047857">5x compression</text>
  </g>
</svg>
