<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#ef4444"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#22c55e"/><stop offset="100%" stop-color="#10b981"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="520" rx="16" fill="#fafafa"/>

  <!-- Title -->
  <text x="410" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">GPU Memory: Where Does It All Go?</text>
  <text x="410" y="62" text-anchor="middle" font-size="13" fill="#64748b">MiniCPM4.1-8B (8B params) — every bar = 24 GB total</text>

  <!-- Legend -->
  <rect x="180" y="76" width="14" height="14" rx="3" fill="url(#g1)"/>
  <text x="200" y="88" font-size="12" fill="#475569">Model Weights</text>
  <rect x="310" y="76" width="14" height="14" rx="3" fill="url(#g2)"/>
  <text x="330" y="88" font-size="12" fill="#475569">FP16 KV Cache</text>
  <rect x="440" y="76" width="14" height="14" rx="3" fill="url(#g3)"/>
  <text x="460" y="88" font-size="12" fill="#475569">TQ-3bit KV Cache</text>
  <rect x="590" y="76" width="14" height="14" rx="3" fill="#e2e8f0"/>
  <text x="610" y="88" font-size="12" fill="#475569">Free</text>

  <!-- ============ Scenario 1: RTX 4090 FP16 ============ -->
  <text x="40" y="135" font-size="14" font-weight="600" fill="#1e293b">RTX 4090 + FP16</text>
  <text x="40" y="152" font-size="11" fill="#94a3b8">7 GB for KV cache = 56 sessions @ 4K context</text>

  <!-- Bar background -->
  <rect x="40" y="162" width="740" height="44" rx="8" fill="#e2e8f0" filter="url(#shadow)"/>
  <!-- Model 16 GB = 16/24 * 740 = 493 px -->
  <rect x="40" y="162" width="493" height="44" rx="8" fill="url(#g1)"/>
  <text x="286" y="189" text-anchor="middle" font-size="13" font-weight="600" fill="white">Model Weights — 16 GB</text>
  <!-- KV 7 GB = 7/24 * 740 = 216 px -->
  <rect x="533" y="162" width="216" height="44" rx="0" fill="url(#g2)"/>
  <rect x="533" y="162" width="216" height="44" rx="0 8 8 0" fill="url(#g2)"/>
  <text x="641" y="189" text-anchor="middle" font-size="13" font-weight="600" fill="white">KV — 7 GB</text>
  <!-- Overhead sliver 1GB = 31 px, included in "model" for simplicity -->

  <!-- Sessions count -->
  <rect x="608" y="216" width="170" height="30" rx="15" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="693" y="236" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">56 sessions</text>

  <!-- ============ Scenario 2: RTX 4090 + TQ-3bit ============ -->
  <text x="40" y="280" font-size="14" font-weight="600" fill="#1e293b">RTX 4090 + TQ-3bit</text>
  <text x="40" y="297" font-size="11" fill="#94a3b8">Same 7 GB, but 1.66x more effective → 93 sessions @ 4K context</text>

  <rect x="40" y="307" width="740" height="44" rx="8" fill="#e2e8f0" filter="url(#shadow)"/>
  <!-- Model 16 GB -->
  <rect x="40" y="307" width="493" height="44" rx="8" fill="url(#g1)"/>
  <text x="286" y="334" text-anchor="middle" font-size="13" font-weight="600" fill="white">Model Weights — 16 GB</text>
  <!-- TQ KV: actually same 7 GB on GPU but represents 11.6 GB effective -->
  <!-- Show as: 4.2 GB actual (blue) + 2.8 GB freed (green) -->
  <!-- 4.2 GB = 4.2/24 * 740 = 129 px -->
  <rect x="533" y="307" width="129" height="44" fill="url(#g3)"/>
  <text x="598" y="334" text-anchor="middle" font-size="11" font-weight="600" fill="white">TQ — 4.2 GB</text>
  <!-- Free 3.8 GB = 3.8/24 * 740 = 117 px, but show as part of bar -->
  <rect x="662" y="307" width="118" height="44" rx="0 8 8 0" fill="url(#g4)" opacity="0.7"/>
  <text x="721" y="330" text-anchor="middle" font-size="11" font-weight="600" fill="white">FREED</text>
  <text x="721" y="345" text-anchor="middle" font-size="11" font-weight="600" fill="white">2.8 GB</text>

  <rect x="608" y="361" width="170" height="30" rx="15" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="693" y="381" text-anchor="middle" font-size="13" font-weight="600" fill="#059669">93 sessions (+66%)</text>

  <!-- ============ Arrow / Insight ============ -->
  <rect x="120" y="415" width="580" height="70" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="410" y="443" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">Same GPU. Same model. 66% more users.</text>
  <text x="410" y="465" text-anchor="middle" font-size="12" fill="#3b82f6">Or: the same 56 sessions need only 4.2 GB instead of 7 GB — fits on a cheaper GPU.</text>
</svg>
